<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengetahuan Astronomi - IEPEAS</title>
    <style>
        /* --- Gaya CSS (Style) --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0a0f1c 0%, #0f172a 40%, #1e293b 100%);
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            color: #e2e8f0;
        }

        /* Menu navigasi */
        .menu-container {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
        }
        .menu-toggle {
            font-size: 32px;
            cursor: pointer;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(4px);
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: 0.2s;
            border: 1px solid rgba(59,130,246,0.4);
        }
        .menu-toggle:hover {
            background: #3b82f6;
            color: white;
        }
        .menu-dropdown {
            position: absolute;
            top: 55px;
            left: 0;
            background: rgba(15, 25, 45, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 10px 0;
            min-width: 150px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s;
            border: 1px solid rgba(59,130,246,0.4);
        }
        .menu-dropdown.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        .menu-dropdown a {
            display: block;
            padding: 10px 20px;
            color: #cbd5e6;
            text-decoration: none;
            transition: 0.2s;
            font-size: 1rem;
        }
        .menu-dropdown a:hover {
            background: #3b82f6;
            color: white;
        }

        /* Kontainer utama */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 80px 20px;
        }

        /* Header halaman */
        .header {
            text-align: center;
            margin-bottom: 50px;
        }
        .header h1 {
            font-size: 48px;
            color: white;
            text-shadow: 0 0 8px rgba(0,0,0,0.5);
            margin-bottom: 10px;
        }
        .header p {
            font-size: 1.1rem;
            opacity: 0.8;
        }

        /* Tempat untuk menampilkan daftar fakta */
        .facts-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 800px;
            margin: 0 auto;
        }

        /* Setiap item fakta */
        .fact-item {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 20px 28px;
            border: 1px solid rgba(59,130,246,0.3);
            transition: transform 0.2s, background 0.2s;
            font-size: 1rem;
            line-height: 1.5;
        }
        .fact-item:hover {
            transform: translateX(8px);
            background: rgba(59,130,246,0.2);
        }

        /* Teks error atau loading */
        .loading, .error {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
            background: rgba(30, 41, 59, 0.4);
            border-radius: 28px;
            max-width: 600px;
            margin: 0 auto;
        }
        .error {
            color: #f87171;
        }

        .credit {
            text-align: center;
            font-size: 8px;
            opacity: 0.5;
            margin-top: 60px;
        }

        @media (max-width: 650px) {
            .header h1 {
                font-size: 32px;
            }
            .fact-item {
                padding: 16px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <!-- Menu titik tiga (sama seperti di halaman lain) -->
    <div class="menu-container">
        <div class="menu-toggle" id="menuToggle">☰</div>
        <div class="menu-dropdown" id="menuDropdown">
            <a href="home.html">🏠 Home</a>
            <a href="web.html">📝 Daftar</a>
            <a href="linktree.html">🔗 Linktree</a>
            <a href="fun-facts.html">💡 Galeri Pengetahuan</a>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <h1>🌌 Pengetahuan Astronomi</h1>
            <p>Fakta-fakta menarik tentang luar angkasa, planet, dan bintang</p>
        </div>

        <!-- Tempat daftar fakta akan muncul -->
        <div id="factsContainer" class="facts-list">
            <div class="loading">✨ Sedang memuat fakta-fakta keren...</div>
        </div>

        <div class="credit">©IEPEAS</div>
    </div>

    <script>
        // --- Fungsi untuk membaca file teks dan menampilkannya ---
        async function loadFacts() {
            const container = document.getElementById('factsContainer');
            // Nama file teks yang akan dibaca
            const fileName = 'astro-facts.txt'; 

            try {
                // Memanggil file .txt menggunakan Fetch API
                const response = await fetch(fileName);
                
                // Jika file tidak ditemukan
                if (!response.ok) {
                    throw new Error(`File ${fileName} tidak ditemukan atau tidak bisa diakses.`);
                }

                // Membaca isi file sebagai teks
                const text = await response.text();
                
                // Memisahkan setiap baris
                const lines = text.split(/\r?\n/);
                
                // Menyaring baris yang kosong
                const facts = lines.filter(line => line.trim().length > 0);
                
                // Jika tidak ada fakta yang ditemukan
                if (facts.length === 0) {
                    container.innerHTML = '<div class="error">⚠️ Belum ada fakta di file. Yuk tambahkan!</div>';
                    return;
                }
                
                // Membuat elemen HTML untuk setiap fakta
                let htmlContent = '';
                for (let fact of facts) {
                    htmlContent += `<div class="fact-item">✨ ${fact}</div>`;
                }
                
                // Menampilkan semua fakta ke dalam container
                container.innerHTML = htmlContent;
                
            } catch (error) {
                // Menampilkan pesan error jika ada masalah
                console.error('Gagal memuat fakta:', error);
                container.innerHTML = `<div class="error">❌ Gagal memuat fakta. Pastikan file <strong>${fileName}</strong> ada di folder yang sama dengan file HTML ini.</div>`;
            }
        }

        // Memanggil fungsi utama saat halaman selesai dimuat
        document.addEventListener('DOMContentLoaded', loadFacts);

        // Kode untuk menu dropdown (copy dari halaman sebelumnya)
        const menuToggle = document.getElementById('menuToggle');
        const menuDropdown = document.getElementById('menuDropdown');
        menuToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            menuDropdown.classList.toggle('show');
        });
        document.addEventListener('click', function(event) {
            if (!menuToggle.contains(event.target) && !menuDropdown.contains(event.target)) {
                menuDropdown.classList.remove('show');
            }
        });
    </script>
</body>
</html>
